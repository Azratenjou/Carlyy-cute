<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💌</title>
<link rel="stylesheet" href="lock.css">
</head>
<body>

<div class="bg"></div>

<div class="lock-container">

    <h2 class="title">A little something for you carlyyy baby💖</h2>
    <p class="subtitle">Enter the passcode muna hehe</p>

    <div class="padlock" id="padlock">
        <div class="shackle"></div>
        <div class="body"></div>
    </div>

    <div class="dots">
        <span class="dot" id="dot0"></span>
        <span class="dot" id="dot1"></span>
        <span class="dot" id="dot2"></span>
        <span class="dot" id="dot3"></span>
    </div>

    <div class="keypad">
        <button onclick="press(1)">1</button>
        <button onclick="press(2)">2</button>
        <button onclick="press(3)">3</button>
        <button onclick="press(4)">4</button>
        <button onclick="press(5)">5</button>
        <button onclick="press(6)">6</button>
        <button onclick="press(7)">7</button>
        <button onclick="press(8)">8</button>
        <button onclick="press(9)">9</button>
        <div></div>
        <button onclick="press(0)">0</button>
        <button onclick="del()">⌫</button>
    </div>

    <div id="status"></div>
    <div id="hint"></div>

</div>

<!-- FINAL MESSAGE -->
<div id="finalMessage">I've made this just for you… 💖</div>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
    <div class="loader-text">Loading love message… 💌</div>
</div>

<!-- AUDIO -->

<audio id="unlockSound" src="unlock.mp3"></audio>

<script src="lock.js"></script>
</body>
</html>
